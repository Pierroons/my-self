# SelfJustice — Nginx vhost configuration
# Deployment: justice.rpi4server.ovh via Cloudflare Tunnel
# SSL is handled by Cloudflare — this vhost listens on HTTP only.

# Rate limiting zone (prevent abuse)
limit_req_zone $binary_remote_addr zone=selfjustice:10m rate=10r/s;

server {
    listen 80;
    server_name justice.rpi4server.ovh;

    root /var/www/selfjustice;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; frame-ancestors 'none'" always;

    # Rate limiting
    limit_req zone=selfjustice burst=20 nodelay;

    # Main location — single static page
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache the page aggressively (it changes rarely)
    location = /index.html {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Block common attack paths
    location ~ /\. { deny all; }
    location ~ \.php$ { deny all; }
    location ~ ~$ { deny all; }

    # Disable server tokens
    server_tokens off;

    # Access log (optional — disable if privacy is a concern)
    access_log /var/log/nginx/selfjustice-access.log;
    error_log /var/log/nginx/selfjustice-error.log warn;
}
