# SelfJustice — Nginx vhost avec API (patch complet)
# Route /api/* vers api.php (PHP-FPM)

limit_req_zone $binary_remote_addr zone=selfjustice:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=selfjustice_api:10m rate=5r/s;

server {
    server_name justice.rpi4server.ovh 192.168.1.60;

    root /var/www/selfjustice;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; frame-ancestors 'none'" always;

    # ===================================
    # API — /api/* routée vers api.php
    # ===================================
    location /api {
        limit_req zone=selfjustice_api burst=10 nodelay;
        try_files $uri $uri/ /api/api.php$is_args$args;
    }

    location ~ ^/api/api\.php {
        limit_req zone=selfjustice_api burst=10 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/api/api.php;
    }

    # ===================================
    # Main location — page statique
    # ===================================
    location / {
        limit_req zone=selfjustice burst=20 nodelay;
        try_files $uri $uri/ =404;
    }

    # Cache the page aggressively (it changes rarely)
    location = /index.html {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Block common attack paths
    location ~ /\. { deny all; }
    # Bloquer tous les .php SAUF /api/api.php qui est géré plus haut
    location ~ \.php$ { deny all; }
    location ~ ~$ { deny all; }

    # Disable server tokens
    server_tokens off;

    # Logs
    access_log /var/log/nginx/selfjustice-access.log;
    error_log /var/log/nginx/selfjustice-error.log warn;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/justice.rpi4server.ovh/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/justice.rpi4server.ovh/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = justice.rpi4server.ovh) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name justice.rpi4server.ovh 192.168.1.60;
    return 404; # managed by Certbot
}
