# MySelf — Landing racine my-self.fr
# Déployé le 17/04/2026

server {
    server_name my-self.fr www.my-self.fr;

    root /var/www/my-self;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; frame-ancestors 'none'" always;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache
    location = /index.html {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Block attack paths
    location ~ /\. { deny all; }
    location ~ \.php$ { deny all; }
    location ~ ~$ { deny all; }

    server_tokens off;

    access_log /var/log/nginx/myself-access.log;
    error_log /var/log/nginx/myself-error.log warn;

    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate /etc/letsencrypt/live/my-self.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my-self.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name my-self.fr www.my-self.fr;

    if ($host ~ ^(my-self\.fr|www\.my-self\.fr)$) {
        return 301 https://$host$request_uri;
    }
    return 404;
}
