# SelfJustice — Nginx vhost pour justice.my-self.fr
# Migration du 17/04/2026 — ancien domaine justice.rpi4server.ovh gardé en 301

limit_req_zone $binary_remote_addr zone=selfjustice:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=selfjustice_api:10m rate=5r/s;
# Admin privé (endpoint surveillance) : 10 req/min max (burst 5)
limit_req_zone $binary_remote_addr zone=selfjustice_admin:10m rate=10r/m;

# ============================================================
# NOUVEAU domaine canonique : justice.my-self.fr
# ============================================================
server {
    server_name justice.my-self.fr 192.168.1.60;

    root /var/www/selfjustice;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; frame-ancestors 'none'" always;

    # API — /api/* routée vers api.php
    location /api {
        limit_req zone=selfjustice_api burst=10 nodelay;
        try_files $uri $uri/ /api/api.php$is_args$args;
    }

    location ~ ^/api/api\.php {
        limit_req zone=selfjustice_api burst=10 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/api/api.php;
    }

    # Admin watch — endpoint privé de surveillance.
    # URL : /w-<token 32 hex>/ → lit /var/lib/selfjustice/admin/token.txt
    # N'utilise PAS snippets/fastcgi-php.conf qui fait un try_files basé
    # sur l'URI (cet URI n'existe pas comme fichier) et renverrait 404
    # avant même d'appeler PHP. On passe par fastcgi.conf + SCRIPT_FILENAME
    # absolu.
    location ~ "^/w-([a-f0-9]{32})/?$" {
        limit_req zone=selfjustice_admin burst=5 nodelay;
        set $sj_token $1;
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/selfjustice/admin/watch.php;
        fastcgi_param SCRIPT_NAME /admin/watch.php;
        fastcgi_param SJ_PROVIDED_TOKEN $sj_token;
    }

    # Main location — page statique
    location / {
        limit_req zone=selfjustice burst=20 nodelay;
        try_files $uri $uri/ =404;
    }

    # Cache
    location = /index.html {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Block attack paths
    location ~ /\. { deny all; }
    location ~ \.php$ { deny all; }
    location ~ ~$ { deny all; }

    server_tokens off;

    access_log /var/log/nginx/selfjustice-access.log;
    error_log /var/log/nginx/selfjustice-error.log warn;

    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate /etc/letsencrypt/live/justice.my-self.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/justice.my-self.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Redirect HTTP → HTTPS pour justice.my-self.fr
server {
    listen 80;
    listen [::]:80;
    server_name justice.my-self.fr 192.168.1.60;

    if ($host = justice.my-self.fr) {
        return 301 https://$host$request_uri;
    }
    return 404;
}

# ============================================================
# ANCIEN domaine : justice.rpi4server.ovh → 301 vers nouveau
# Garde le cert existant jusqu'à son expiration naturelle.
# ============================================================
server {
    server_name justice.rpi4server.ovh;

    access_log /var/log/nginx/selfjustice-redirect.log;
    error_log /var/log/nginx/selfjustice-redirect-error.log warn;

    # Redirection permanente vers le nouveau domaine
    return 301 https://justice.my-self.fr$request_uri;

    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate /etc/letsencrypt/live/justice.rpi4server.ovh/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/justice.rpi4server.ovh/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name justice.rpi4server.ovh;
    return 301 https://justice.my-self.fr$request_uri;
}
