# Bi-Self — Vhost pour bi-self.my-self.fr
# Landing binôme SelfRecover + SelfModerate, préparé pour accueillir les
# démos live interactives (spec : bi-self/docs/demo/SPEC.md).

limit_req_zone $binary_remote_addr zone=biself:10m rate=10r/s;

server {
    server_name bi-self.my-self.fr;

    root /var/www/bi-self;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; frame-ancestors 'none'" always;

    location / {
        limit_req zone=biself burst=20 nodelay;
        try_files $uri $uri/ =404;
    }

    location = /index.html {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Block attack paths
    location ~ /\. { deny all; }
    location ~ \.php$ { deny all; }
    location ~ ~$ { deny all; }

    server_tokens off;

    access_log /var/log/nginx/biself-access.log;
    error_log /var/log/nginx/biself-error.log warn;

    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate /etc/letsencrypt/live/bi-self.my-self.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bi-self.my-self.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name bi-self.my-self.fr;
    if ($host = bi-self.my-self.fr) {
        return 301 https://$host$request_uri;
    }
    return 404;
}
